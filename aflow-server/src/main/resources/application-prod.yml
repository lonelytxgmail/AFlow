## ─── 生产环境配置（MySQL 数据库） ───
## 启动方式：java -jar aflow-server.jar --spring.profiles.active=prod
## 
## 需要配置以下环境变量：
##   MYSQL_HOST     — MySQL 主机地址（默认 localhost）
##   MYSQL_PORT     — MySQL 端口（默认 3306）
##   MYSQL_DATABASE — 数据库名（默认 aflow）
##   MYSQL_USER     — 数据库用户名（默认 root）
##   MYSQL_PASSWORD — 数据库密码

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aflow}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

# 生产环境降低日志级别
logging:
  level:
    com.aflow: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

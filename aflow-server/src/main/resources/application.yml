## ─── AFlow 公共配置（所有环境共享） ───

server:
  port: 8080

spring:
  application:
    name: aflow-server
  # 默认激活 dev profile，生产环境通过命令行 --spring.profiles.active=prod 覆盖
  profiles:
    active: dev
  # 启用虚拟线程（Java 21），提升异步场景下的并发能力
  threads:
    virtual:
      enabled: true
  # JPA 公共配置
  jpa:
    hibernate:
      ddl-auto: none  # schema 由 Flyway 管理，不自动建表
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Swagger / OpenAPI 文档
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志级别
logging:
  level:
    com.aflow: DEBUG
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

# AFlow 引擎配置
aflow:
  engine:
    node-timeout-ms: 300000  # 节点执行超时（5 分钟）
    # 活跃流程上下文缓存（Caffeine）
    context-cache:
      max-size: 10000      # 最大缓存条数
      ttl-minutes: 30      # 访问后过期时间（分钟）
  agent:
    tool-timeout-ms: 30000          # 工具调用超时（30 秒）
    token-budget: 100000            # Token 预算（~100K tokens）
    tool-result-max-length: 4000    # 工具结果截断阈值（字符数）
    llm:
      retry:
        max-attempts: 3             # LLM 调用最大重试次数
        initial-backoff-ms: 1000    # 首次退避时间（毫秒）
        backoff-multiplier: 2.0     # 退避指数乘数

# Actuator / Metrics / Tracing 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0  # 开发环境全量采样，生产环境建议 0.1
    enabled: true
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces  # OTLP HTTP endpoint (Jaeger/Tempo)
      # 如未部署 OTLP collector，tracing 会优雅降级为 NOOP
